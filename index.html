<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Occupancy Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(11, 24, 43, 0.92);
      --panel-border: rgba(141, 179, 255, 0.24);
      --text: #f4f8ff;
      --muted: #b2c3de;
      --blue: #4c7dff;
      --cyan: #45d4ff;
      --green: #33d17a;
      --yellow: #f6c344;
      --red: #ff5f6d;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(76,125,255,0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(69,212,255,0.12), transparent 22%),
        radial-gradient(circle at bottom center, rgba(155,109,255,0.10), transparent 28%),
        linear-gradient(180deg, #081120 0%, #07111f 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      width: 100vw;
      height: 100vh;
      padding: 22px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      padding: 4px 2px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .title-block p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    .status {
      text-align: right;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .status strong {
      color: var(--text);
      font-size: 18px;
    }

    .main {
      min-height: 0;
      display: grid;
      place-items: stretch;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent 20%),
        radial-gradient(circle at top right, rgba(76,125,255,0.15), transparent 30%);
      pointer-events: none;
    }

    .card-header {
      position: relative;
      z-index: 1;
      padding: 18px 22px 0;
    }

    .card-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
    }

    .card-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card-body {
      position: relative;
      z-index: 1;
      height: calc(100% - 90px);
      padding: 12px 16px 16px;
    }

    #occupancyChart {
      width: 100%;
      height: 100%;
      min-height: 420px;
    }

    .chart-summary {
      position: absolute;
      top: 16px;
      right: 20px;
      z-index: 2;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      pointer-events: none;
    }

    .summary-pill {
      min-width: 130px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .summary-pill .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary-pill .value {
      display: block;
      color: var(--text);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    @media (max-width: 900px) {
      .shell { padding: 14px; }
      .header {
        align-items: flex-start;
        flex-direction: column;
      }
      .chart-summary {
        position: static;
        margin-bottom: 10px;
        pointer-events: auto;
      }
      .card-body {
        height: calc(100% - 100px);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="title-block">
        <h1>Occupancy Dashboard</h1>
        <p>Monitoraggio percentuale di occupazione sede</p>
      </div>
      <div class="status">
        <div><strong id="lastUpdate">Ultimo aggiornamento: --</strong></div>
      </div>
    </header>

    <main class="main">
      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Occupancy mensile postazioni</h2>
          <p class="card-subtitle">Andamento giornaliero della percentuale di occupazione della sede</p>
        </div>

        <div class="card-body">
          <div class="chart-summary" id="chartSummary"></div>
          <div id="occupancyChart"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const dashboardData = {
      updated_at: '2026-03-25 22:16',
      site_name: 'Sede Milano',
      month_label: 'Marzo 2026',
      occupancy_daily: [
        { day: '01', value: 54 },
        { day: '02', value: 58 },
        { day: '03', value: 61 },
        { day: '04', value: 63 },
        { day: '05', value: 57 },
        { day: '06', value: 32 },
        { day: '07', value: 18 },
        { day: '08', value: 22 },
        { day: '09', value: 59 },
        { day: '10', value: 64 },
        { day: '11', value: 67 },
        { day: '12', value: 62 },
        { day: '13', value: 60 },
        { day: '14', value: 35 },
        { day: '15', value: 20 },
        { day: '16', value: 66 },
        { day: '17', value: 69 },
        { day: '18', value: 71 },
        { day: '19', value: 68 },
        { day: '20', value: 65 },
        { day: '21', value: 39 },
        { day: '22', value: 24 },
        { day: '23', value: 27 },
        { day: '24', value: 72 },
        { day: '25', value: 74 },
        { day: '26', value: 70 },
        { day: '27', value: 67 },
        { day: '28', value: 63 },
        { day: '29', value: 41 },
        { day: '30', value: 29 },
        { day: '31', value: 25 }
      ]
    };

    function formatTimestamp(value) {
      if (!value) return '--';
      const normalized = String(value).replace(' ', 'T');
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('it-IT', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getOccupancyColor(value) {
      if (value < 35) return '#33d17a';
      if (value < 60) return '#45d4ff';
      if (value < 75) return '#f6c344';
      return '#ff5f6d';
    }

    function computeMetrics(series) {
      const values = series.map(item => Number(item.value || 0));
      const total = values.reduce((sum, current) => sum + current, 0);
      return {
        avg: Math.round(total / values.length),
        peak: Math.max(...values),
        min: Math.min(...values)
      };
    }

    function renderSummary(metrics) {
      const summary = document.getElementById('chartSummary');
      summary.innerHTML = `
        <div class="summary-pill">
          <span class="label">Media mese</span>
          <span class="value">${metrics.avg}%</span>
        </div>
        <div class="summary-pill">
          <span class="label">Picco</span>
          <span class="value">${metrics.peak}%</span>
        </div>
        <div class="summary-pill">
          <span class="label">Minimo</span>
          <span class="value">${metrics.min}%</span>
        </div>
      `;
    }

    function buildOccupancyChart(containerId, data) {
      const chart = echarts.init(document.getElementById(containerId));
      const series = Array.isArray(data.occupancy_daily) ? data.occupancy_daily : [];
      const days = series.map(item => item.day);
      const values = series.map(item => Number(item.value || 0));
      const metrics = computeMetrics(series);

      renderSummary(metrics);

      chart.setOption({
        backgroundColor: 'transparent',
        animationDuration: 900,
        animationEasing: 'cubicOut',
        grid: {
          left: 54,
          right: 24,
          top: 96,
          bottom: 54,
          containLabel: true
        },
        tooltip: {
          trigger: 'axis',
          axisPointer: {
            type: 'shadow',
            shadowStyle: {
              color: 'rgba(255,255,255,0.05)'
            }
          },
          backgroundColor: 'rgba(7,17,31,0.96)',
          borderWidth: 0,
          textStyle: { color: '#ffffff' },
          formatter: function(params) {
            const point = params[0];
            return 'Giorno ' + point.axisValue + '<br>Occupancy: <b>' + point.value + '%</b>';
          }
        },
        xAxis: {
          type: 'category',
          data: days,
          axisLine: {
            lineStyle: { color: 'rgba(255,255,255,0.18)' }
          },
          axisTick: { show: false },
          axisLabel: {
            color: '#9fb2ce',
            fontSize: 12,
            interval: 0,
            margin: 14
          }
        },
        yAxis: {
          type: 'value',
          min: 0,
          max: 100,
          interval: 20,
          axisLabel: {
            color: '#9fb2ce',
            formatter: '{value}%'
          },
          splitLine: {
            lineStyle: {
              color: 'rgba(255,255,255,0.08)',
              type: 'dashed'
            }
          },
          axisLine: { show: false }
        },
        series: [
          {
            name: 'Occupancy',
            type: 'bar',
            barWidth: '58%',
            data: values,
            itemStyle: {
              borderRadius: [8, 8, 0, 0],
              color: function(params) {
                return getOccupancyColor(params.value);
              }
            },
            emphasis: {
              itemStyle: {
                shadowBlur: 18,
                shadowColor: 'rgba(69,212,255,0.28)'
              }
            },
            markLine: {
              symbol: 'none',
              lineStyle: {
                color: '#45d4ff',
                type: 'dashed',
                width: 1.5
              },
              label: {
                color: '#45d4ff',
                formatter: 'Media {c}%'
              },
              data: [{ yAxis: metrics.avg }]
            }
          }
        ],
        graphic: [
          {
            type: 'text',
            left: 14,
            top: 18,
            style: {
              text: (data.site_name || 'Sede') + ' · ' + (data.month_label || ''),
              fill: '#45d4ff',
              font: '600 16px Inter, Segoe UI, sans-serif'
            }
          }
        ]
      });

      return chart;
    }

    document.getElementById('lastUpdate').textContent = 'Ultimo aggiornamento: ' + formatTimestamp(dashboardData.updated_at);
    const occupancyChart = buildOccupancyChart('occupancyChart', dashboardData);
    window.addEventListener('resize', function() {
      occupancyChart.resize();
    });

    // Step successivo:
    // sostituiamo dashboardData con una fetch verso un file JSON su GitHub Pages.
  </script>
</body>
</html>
