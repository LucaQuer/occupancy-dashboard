<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Occupancy Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(11, 24, 43, 0.92);
      --panel-border: rgba(141, 179, 255, 0.24);
      --text: #f4f8ff;
      --muted: #b2c3de;
      --grid: rgba(255,255,255,0.08);
      --cyan: #45d4ff;
      --green: #33d17a;
      --yellow: #f6c344;
      --red: #ff5f6d;
      --free: rgba(147, 170, 215, 0.34);
      --weekend: rgba(255,255,255,0.05);
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(76,125,255,0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(69,212,255,0.12), transparent 22%),
        radial-gradient(circle at bottom center, rgba(155,109,255,0.10), transparent 28%),
        linear-gradient(180deg, #081120 0%, #07111f 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      width: 100vw;
      height: 100vh;
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      padding: 4px 2px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .title-block p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    .status {
      text-align: right;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .status strong {
      color: var(--text);
      font-size: 18px;
    }

    .main {
      min-height: 0;
      display: grid;
    }

    .grid {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      height: 100%;
    }

    .card {
      position: relative;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent 20%),
        radial-gradient(circle at top right, rgba(76,125,255,0.15), transparent 30%);
      pointer-events: none;
    }

    .card-header {
      position: relative;
      z-index: 1;
      padding: 18px 22px 0;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cyan);
      background: rgba(69,212,255,0.08);
      border: 1px solid rgba(69,212,255,0.16);
    }

    .card-title {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
    }

    .card-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card-body {
      position: relative;
      z-index: 1;
      min-height: 0;
      padding: 12px 16px 16px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .chart-summary {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 58px;
    }

    .summary-pill {
      min-width: 122px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .summary-pill .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary-pill .value {
      display: block;
      color: var(--text);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .chart {
      width: 100%;
      height: 100%;
      min-height: 320px;
    }

    .loading {
      display: grid;
      place-items: center;
      height: 100%;
      color: var(--muted);
      font-size: 22px;
    }

    @media (max-width: 1200px) {
      html, body {
        overflow: auto;
      }

      .shell {
        height: auto;
        min-height: 100vh;
      }

      .grid {
        grid-template-columns: 1fr;
        height: auto;
      }

      .card {
        min-height: 560px;
      }
    }

    @media (max-width: 900px) {
      .shell {
        padding: 14px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .status {
        text-align: left;
      }

      .chart-summary {
        justify-content: flex-start;
      }
    }
  </style>
</head>

    function withCacheBuster(path) {
      const separator = path.includes('?') ? '&' : '?';
      return `${path}${separator}v=${CACHE_BUSTER}`;
    }

    async function fetchJson(path) {
      const response = await fetch(withCacheBuster(path), { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Errore nel caricamento di ${path} (${response.status})`);
      }
      return response.json();
    }

    function formatTimestamp(value) {
      if (!value) return '--';
      const normalized = String(value).replace(' ', 'T');
      const date = new Date(normalized);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString('it-IT', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function normalizeDashboardData(raw) {
      const cities = Array.isArray(raw?.cities) ? raw.cities : [];
      return {
        updated_at: raw?.updated_at || null,
        range_label: raw?.range_label || 'Ultimi 30 giorni',
        cities: cities.map(city => ({
          site_name: city?.site_name || 'Sede',
          month_label: city?.month_label || raw?.range_label || 'Ultimi 30 giorni',
          occupancy_daily: Array.isArray(city?.occupancy_daily)
            ? city.occupancy_daily.map(item => ({
                day: String(item?.day || '').padStart(2, '0'),
                date: item?.date || null,
                occupied: item?.occupied ?? null,
                free: item?.free ?? null,
                percentage: item?.percentage ?? null,
                is_weekend: item?.is_weekend === true,
                has_data: item?.has_data === true
              }))
            : []
        }))
      };
    }

    function getOccupancyColor(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return 'rgba(255,255,255,0.14)';
      if (n < 35) return '#33d17a';
      if (n < 60) return '#45d4ff';
      if (n < 75) return '#f6c344';
      return '#ff5f6d';
    }

    function computeMetrics(series) {
      const values = series
        .map(item => Number(item.percentage))
        .filter(value => Number.isFinite(value));

      if (!values.length) {
        return { avg: 0, peak: 0, min: 0 };
      }

      const total = values.reduce((sum, value) => sum + value, 0);

      return {
        avg: Math.round((total / values.length) * 10) / 10,
        peak: Math.max(...values),
        min: Math.min(...values)
      };
    }

    function formatMetricValue(value) {
      if (Math.round(value) === value) return `${value}%`;
      return `${value.toFixed(1)}%`;
    }

    function renderSummary(containerId, metrics) {
      const el = document.getElementById(containerId);
      el.innerHTML = `
        <div class="summary-pill">
          <span class="label">Media mese</span>
          <span class="value">${formatMetricValue(metrics.avg)}</span>
        </div>
        <div class="summary-pill">
          <span class="label">Picco</span>
          <span class="value">${formatMetricValue(metrics.peak)}</span>
        </div>
        <div class="summary-pill">
          <span class="label">Minimo</span>
          <span class="value">${formatMetricValue(metrics.min)}</span>
        </div>
      `;
    }

    function buildWeekendBands(series) {
      const bands = [];
      let start = null;

      for (let i = 0; i < series.length; i++) {
        const weekend = series[i]?.is_weekend === true;

        if (weekend && start === null) start = i;

        const close = !weekend || i === series.length - 1;
        if (start !== null && close) {
          const end = weekend && i === series.length - 1 ? i : i - 1;
          bands.push([{ xAxis: start - 0.5 }, { xAxis: end + 0.5 }]);
          start = null;
        }
      }

      return bands;
    }

    function buildChartOption(city) {
      const series = Array.isArray(city.occupancy_daily) ? city.occupancy_daily : [];
      const metrics = computeMetrics(series);

      const categories = series.map(item => item.day);
      const occupiedData = series.map(item => item.has_data ? Number(item.occupied || 0) : null);
      const freeData = series.map(item => item.has_data ? Number(item.free || 0) : null);
      const totals = series.map(item => item.has_data ? Number(item.occupied || 0) + Number(item.free || 0) : 0);

      const maxCapacity = Math.max(...totals, 10);
      const weekendBands = buildWeekendBands(series);

      return {
        metrics,
        option: {
          backgroundColor: 'transparent',
          animationDuration: 700,
          animationEasing: 'cubicOut',
          grid: {
            left: 54,
            right: 18,
            top: 24,
            bottom: 56,
            containLabel: true
          },
          tooltip: {
            trigger: 'axis',
            axisPointer: {
              type: 'shadow',
              shadowStyle: { color: 'rgba(255,255,255,0.04)' }
            },
            backgroundColor: 'rgba(7,17,31,0.96)',
            borderWidth: 0,
            textStyle: { color: '#ffffff' },
            formatter: function(params) {
              const dataIndex = params?.[0]?.dataIndex ?? 0;
              const item = series[dataIndex];
              if (!item) return '';

              if (item.is_weekend) {
                return `Giorno ${item.day}<br><b>Weekend</b>`;
              }

              if (!item.has_data) {
                return `Giorno ${item.day}<br><b>Nessun dato</b>`;
              }

              return [
                `Giorno ${item.day}`,
                `Occupati: <b>${item.occupied}</b>`,
                `Liberi: <b>${item.free}</b>`,
                `Occupancy: <b>${formatMetricValue(Number(item.percentage || 0))}</b>`
              ].join('<br>');
            }
          },
          xAxis: {
            type: 'category',
            data: categories,
            axisLine: {
              lineStyle: { color: 'rgba(255,255,255,0.16)' }
            },
            axisTick: { show: false },
            axisLabel: {
              color: '#9fb2ce',
              fontSize: 11,
              interval: 0,
              margin: 12
            }
          },
          yAxis: {
            type: 'value',
            min: 0,
            max: Math.ceil(maxCapacity * 1.18),
            axisLabel: {
              color: '#9fb2ce'
            },
            splitLine: {
              lineStyle: {
                color: 'rgba(255,255,255,0.08)',
                type: 'dashed'
              }
            },
            axisLine: { show: false }
          },
          series: [
            {
              name: 'Weekend',
              type: 'bar',
              silent: true,
              barGap: '-100%',
              barWidth: '100%',
              itemStyle: { color: 'rgba(255,255,255,0)' },
              emphasis: { disabled: true },
              markArea: {
                silent: true,
                itemStyle: {
                  color: 'rgba(255,255,255,0.05)'
                },
                data: weekendBands
              },
              data: categories.map(() => 0)
            },
            {
              name: 'Occupati',
              type: 'bar',
              stack: 'capacity',
              barWidth: '56%',
              z: 3,
              data: occupiedData,
              itemStyle: {
                color: function(params) {
                  const item = series[params.dataIndex];
                  if (!item || !item.has_data) return 'rgba(255,255,255,0)';
                  return getOccupancyColor(item.percentage);
                },
                borderRadius: [8, 8, 0, 0],
                shadowBlur: 10,
                shadowColor: 'rgba(76,125,255,0.16)'
              },
              label: {
                show: true,
                position: 'insideBottom',
                distance: 6,
                color: '#ffffff',
                fontSize: 10,
                fontWeight: 700,
                formatter: function(params) {
                  return params.value == null ? '' : String(params.value);
                }
              }
            },
            {
              name: 'Liberi',
              type: 'bar',
              stack: 'capacity',
              barWidth: '56%',
              z: 2,
              data: freeData,
              itemStyle: {
                color: function(params) {
                  const item = series[params.dataIndex];
                  if (!item || !item.has_data) return 'rgba(255,255,255,0)';
                  return 'rgba(147, 170, 215, 0.34)';
                },
                borderColor: 'rgba(255,255,255,0.10)',
                borderWidth: 1,
                borderRadius: [8, 8, 0, 0]
              },
              label: {
                show: true,
                position: 'top',
                distance: 4,
                color: '#b9c9e3',
                fontSize: 10,
                fontWeight: 700,
                formatter: function(params) {
                  return params.value == null ? '' : String(params.value);
                }
              }
            }
          ],
          graphic: [
            {
              type: 'text',
              left: 10,
              top: 2,
              style: {
                text: `${city.site_name || 'Sede'} · ${city.month_label || 'Ultimi 30 giorni'}`,
                fill: '#45d4ff',
                font: '600 15px Inter, Segoe UI, sans-serif'
              }
            }
          ]
        }
      };
    }

    function buildChart(containerId, summaryId, city) {
      const el = document.getElementById(containerId);
      const chart = echarts.init(el, null, { renderer: 'canvas' });
      const { metrics, option } = buildChartOption(city);
      renderSummary(summaryId, metrics);
      chart.setOption(option, true);
      return chart;
    }

    function findCity(data, needle) {
      return data.cities.find(city =>
        String(city.site_name || '').toLowerCase().includes(needle.toLowerCase())
      );
    }

    async function loadDashboardData() {
      try {
        const json = await fetchJson(DATA_URL);
        return normalizeDashboardData(json);
      } catch (error) {
        console.warn('Errore caricamento JSON, uso fallback locale:', error);
        return normalizeDashboardData(fallbackData);
      }
    }

    const charts = [];

    loadDashboardData().then(function(data) {
      document.getElementById('lastUpdate').textContent =
        'Ultimo aggiornamento: ' + formatTimestamp(data.updated_at);

      const milano = findCity(data, 'milano') || data.cities[0];
      const roma = findCity(data, 'roma') || data.cities[1] || data.cities[0];

      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'grid';

      requestAnimationFrame(function() {
        charts.push(buildChart('chart-milano', 'summary-milano', milano));
        charts.push(buildChart('chart-roma', 'summary-roma', roma));

        setTimeout(function() {
          charts.forEach(chart => chart.resize());
        }, 80);
      });
    });

    window.addEventListener('resize', function() {
      charts.forEach(chart => chart.resize());
    });
  </script>
</body>
</html>
